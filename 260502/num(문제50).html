<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양수,음수 판별</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <input type="number" id="numInput">
    <p id="pnResult"></p>
     <script>
        const btn = document.querySelector("#btn");
        const numInput = document.querySelector("#numInput");
        const pnResult = document.querySelector("#pnResult");
        let positive=5;
        function pnCheck(){
            const num = parseFloat(numInput.value);
            if(isNaN(num)){
                pnResult.innerHTML=`숫자를 입력하세요`;
            }
            else if(num>0){
                pnResult.innerHTML=`양수입니다`
            }else{
                pnResult.innerHTML=`음수입니다`
            }

        }
        btn.addEventListener("click",pnCheck);

     </script>
</body>
</html>
