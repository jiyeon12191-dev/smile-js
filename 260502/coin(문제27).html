<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동전 던지기</title>
</head>
<body>
    <p id="text"></p>
    <button type="button" id="btn">버튼</button>
   
    <script>
        const btn = document.querySelector("#btn");
        const text = document.querySelector("#text");
        const arr=["앞","뒤"];
        function filpCoin(){
            const arrLi=arr[Math.floor(Math.random()*2)];
            text.innerHTML=`${arrLi}`;
            
        }
        btn.addEventListener("click",filpCoin);


    </script>
</body>
</html>
