<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>합격,불합격 출력</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <input type="number" id="scoreInput">
    <p id="pfResult"></p>
    <script>
        const btn = document.querySelector("#btn");
        const scoreInput = document.querySelector("#scoreInput");
        const pfResult = document.querySelector("#pfResult");
        function ispass(){
            const score = parseFloat(scoreInput.value);
            if(isNaN(score)){
                pfResult.innerHTML=`점수를 입력해주세요`;
            }
            else if(score>=60){
                pfResult.innerHTML=`합격입니다`;
            }
            else{
                pfResult.innerHTML=`불합격입니다`;
            }
        }
        btn.addEventListener("click",ispass);



    </script>
</body>
</html>
