<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지 이동,이전 페이지 이동</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <script>
        const btn = document.querySelector("#btn");
        function clickPage(){
            window.history.back();
       // window.location.href="http://google.com"; 페이지 이동

        }
        btn.addEventListener("click",clickPage);
    </script>
</body>
</html>
