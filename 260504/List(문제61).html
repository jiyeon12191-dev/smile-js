<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리스트 항목 추가</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <input type="text" id="userInput">
    <ul id="list"></ul>
    <script>
        const btn = document.querySelector("#btn");
        const userInput = document.querySelector("#userInput");
        const list = document.querySelector("#list");
        let arr = []; //데이터를 저장할 배열
        function listadd(){
            let value = userInput.value;
            if(value==""){
                alert("내용을 입력하세요");
            }else{ // 내용을 입력했을때 실행 
            arr.push(value); // 입력한 내용값 저장 
               let li = document.createElement("li"); // li라는 빈태그 만들기
               li.innerText=value; // 방금 만든 li 태그에 값을 넣어줘
               list.append(li); // ul태그 밑에 li를 추가 
            }
        }
        
        btn.addEventListener("click",listadd);
    </script>
</body>
</html>
