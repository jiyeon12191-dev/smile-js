<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팝업창 열기</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <script>
        const btn = document.querySelector("#btn");
        function popUp(){
            window.open(
                "https://naver.com",
                "popupwindow"
            )
        }
        btn.addEventListener("click",popUp);
    </script>
</body>
</html>
