<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최고점 찾기</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <p id="view"></p>
    <script>
        const btn = document.querySelector("#btn");
        const view = document.querySelector("#view");
        let arr = [10,30,50];
        function scoreMax(){
            max=arr[0];
            for(i=0; i<arr.length; i++){
            if(arr[i]>max){
                max = arr[i];
                view.innerHTML=`${max}`;
            }
            }
        }

        btn.addEventListener("click",scoreMax);
    </script>
</body>
</html>
