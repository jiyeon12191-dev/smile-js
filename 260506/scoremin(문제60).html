<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최저점 찾기</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <p id="view"></p>
    <script>
        const btn = document.querySelector("#btn");
        const view = document.querySelector("#view");
        let arr=[50,20,10]
        function scoreMin(){
            min = arr[0];
            for(let i=0; i<arr.length; i++){
                if(arr[i]<min){
                    min = arr[i];
                    view.innerHTML=`${min}`;
                }
            }
        }
        btn.addEventListener("click",scoreMin);
    </script>
</body>
</html>
