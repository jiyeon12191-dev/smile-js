<!DOCTYPE html>

<head>

</head>
<body>

    <ul id="list">
        <li>선생님</li>
        <li>학생</li>
    </ul>
    <script>
        const btn = document.querySelector("#btn");
        const allTodo = document.querySelector("#allTodo");
        let arr = [];
        function allTodoRe(){
         let arrLi = document.querySelectorAll("li");
        for(let li of arrLi){
            li.remove();
        }
        alert("전체 할일이 삭제 되었습니다");
        }
    btn.addEventListener("click",allTodoRe);

    </script>
</body>
