<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특정 영역으로 이동</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <div id="main" style="margin: 1000px;">
     
    </div>
    
    <a href = "#main">게시판</a>
   <script>
    const main = document.querySelector("#main")
    const btn = document.querySelector("#btn");
  function scoIn(){
    main.scrollIntoView("#main");
  }
  btn.addEventListener("click",scoIn);
   </script> 
</body>
</html>
