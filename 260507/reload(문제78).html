<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <script>
        const btn = document.querySelector("#btn");
        function refresh(){
            location.reload();
        }
        btn.addEventListener("click",refresh);
    </script>
    
</body>
</html>
