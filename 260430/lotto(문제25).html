<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn">버튼</button>
    <p id="lotto">로또</p>
    <script>
        const btn = document.querySelector("#btn");
        const lotto = document.querySelector("#lotto");
        function lottoGame(){
            let arr=[]; // 배열로 변수 
            while(arr.length<6){
                 // 배열의 숫자가 6개가 될때까지 반복 
                const random = Math.floor(Math.random()*45)+1
                // 1부터 45까지의 숫자중 하나를 맘대로 뽑아서 random이라는 변수에 저장 
                if (!arr.includes(random)){ // 배열에 값이 포함되어있지않다면
                   // includes(찾고 싶은값) 포함 되어 있는지 확인할때 사용
                    arr.push(random); // arr.push 배열의 맨끝에 새로운 데이터를 넣을때 사용
                // 반복문이 실행될때 마다 숫자가 하나씩 쌓여서 6개의 숫자가 담긴 배열완성
                }      
            }
            lotto.innerHTML=arr.join(", ");
        }     
        btn.addEventListener("click",lottoGame);
    </script>
</body>
</html>
