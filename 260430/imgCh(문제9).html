<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn">버튼</button>
    <img id="imgBox" src="/260430/강아지.jpg">
    
    <script>
        const btn = document.querySelector("#btn");
        const imgBox=document.querySelector("#imgBox");
        function img_Change(){
            imgBox.src="/260430/키티.jpg"
        }
        btn.addEventListener("click",img_Change);
    </script>
</body>
</html>
