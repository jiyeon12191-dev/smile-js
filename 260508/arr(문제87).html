<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 명언 출력</title>
</head>
<body>
    <button type="button" id="btn">버튼</button>
    <div id="chan"></div>
    <p id="phrase"></p>
    <script>
        const btn = document.querySelector("#btn");
        const phrase = document.querySelector("#phrase");
        const arr=["언제나 현재에 집중할수 있다면 행복할것이다","피할수 없으면 즐겨라","내일은 내일의 태양이 뜬다"];
        const chan = document.querySelector("#chan");
        
        const arrChan=["blue","black","white"];
        function arrLi(){
            let index = Math.floor(Math.random()*arr.length);
            phrase.innerHTML=`${arr[index]}`;
            
            chan.innerHTML=`<button type="button" id="btn1">색상버튼</button>`; // 버튼을 생성 
            const btn1 = document.querySelector("#btn1");
            
            btn1.addEventListener("click", ()=>{
                let index2 = Math.floor(Math.random()*arrChan.length);
                phrase.style.backgroundColor=`${arrChan[index2]}`;
            })
        }
        btn.addEventListener("click",arrLi);
    </script>
</body>
</html>
