<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 시작</title>
<style>
@keyframes jump{
    0%{top: 50%;}
    50%{top:40%;}
    100%{top: 50%;}
}
.jump{
    animation: jump 0.5s;
}
</style>
</head>
<body>
    <button type="button" id="btn">게임 시작</button>
    <button type="button" id="riBtn">우측이동</button>
    <button type="button" id="juBtn">점프버튼</button>
    <div style="position: relative; width: 100%; height: 500px;">
        <div id="ball" style="position: absolute;  transform: translate(-50%,-50%); top: 50%; left: 50%; border-radius: 100%; background-color: bisque; width: 50px; height: 50px; "></div>
    </div>  
      
    <script>
        const btn = document.querySelector("#btn");
        const riBtn = document.querySelector("#riBtn");
        const juBtn = document.querySelector("#juBtn");
        
        const ball = document.querySelector("#ball");
        let x=50,y=50;
        function game(){
            y-=5;
          ball.style.top = `${y}% `;
        }
        btn.addEventListener("click",game);
        
        function moveGame(){
            x+=5;
            ball.style.left = `${x}%`;
        }
        riBtn.addEventListener("click",moveGame);
        
        function juGame(){

            ball.classList.toggle("jump");
        }
        juBtn.addEventListener("click",juGame);
    </script>
</body>
</html>
